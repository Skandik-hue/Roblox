<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сюрприз</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: #fff;
            cursor: pointer;
            user-select: none;
        }
        #hint {
            font-size: 2.5rem;
            text-align: center;
            transition: opacity 0.3s;
        }
        #scare {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        #scare img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* картинка заполнит экран без искажений */
        }
    </style>
</head>
<body>
    <div id="hint">👻 Нажми в любом месте</div>

    <div id="scare">
        <!-- Замени ссылку на свою страшную картинку -->
        <img src="https://i.imgur.com/your_scary_image.jpg" alt="BOO!">
    </div>

    <script>
        document.addEventListener('click', function scareTrigger() {
            // Убираем подсказку
            document.getElementById('hint').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('hint').style.display = 'none';
            }, 300);

            // Показываем скример
            const scare = document.getElementById('scare');
            scare.style.display = 'flex';

            // Полноэкранный режим (если поддерживается)
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }

            // Воспроизводим звук (замени на свой MP3)
            const audio = new Audio('https://example.com/scream.mp3');
            audio.play().catch(() => {});

            // Удаляем обработчик, чтобы скример сработал только один раз
            document.removeEventListener('click', scareTrigger);
        });
    </script>
</body>
</html>
